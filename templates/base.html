<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EifelLog - Virtuelle Spedition{% endblock %}</title>
    
    <link rel="icon" href="{{ url_for('static', filename='eifellog.jpg') }}" type="image/jpeg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Farbpalette aus dem Logo */
        :root {
            --eifel-yellow: #dce226;
            --eifel-light-green: #89be32;
            --eifel-dark-green: #106f2e;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at top right, #062b1a, #0f172a 60%);
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        /* Glassmorphism Klassen */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Spezial-Button */
        .glass-button {
            background: linear-gradient(135deg, var(--eifel-light-green), var(--eifel-dark-green));
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(137, 190, 50, 0.4);
            filter: brightness(1.1);
        }

        /* Navigation Effekte */
        .nav-link {
            position: relative;
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            opacity: 1;
            color: var(--eifel-yellow);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: linear-gradient(90deg, var(--eifel-yellow), var(--eifel-light-green));
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* --- Page Transitions --- */
        .fade-wrapper {
            animation: fadeIn 0.6s ease-out forwards;
        }

        .fade-out {
            animation: fadeOut 0.4s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(1.02) translateY(-10px); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--eifel-light-green); }
    </style>

    <script>
        // Page Transition Script
        function transitionToPage(href) {
            document.getElementById('page-wrapper').classList.add('fade-out');
            setTimeout(() => {
                window.location.href = href;
            }, 400);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const links = document.querySelectorAll('a:not([target="_blank"]):not([href^="#"])');
            links.forEach(link => {
                link.addEventListener('click', e => {
                    if (link.hostname === window.location.hostname) {
                        e.preventDefault();
                        transitionToPage(link.href);
                    }
                });
            });
        });
    </script>
</head>
<body class="antialiased">

    <header class="fixed top-0 left-0 right-0 z-50 p-4">
        <nav class="max-w-7xl mx-auto glass rounded-2xl px-6 py-3 flex justify-between items-center shadow-2xl">
            <a href="/" class="flex items-center gap-4 group">
                <div class="relative">
                    <div class="absolute -inset-1 bg-[#dce226] rounded-full opacity-20 group-hover:opacity-50 blur transition duration-300"></div>
                    <img src="{{ url_for('static', filename='eifellog.jpg') }}" alt="Eifel LOG Logo" 
                         class="relative h-12 w-12 rounded-full border border-white/20 transform group-hover:scale-110 transition duration-300">
                </div>
                <div class="hidden sm:block">
                    <span class="block text-xl font-bold tracking-tighter leading-none">EIFEL</span>
                    <span class="block text-xs font-black tracking-[0.3em] text-[#89be32] uppercase">LOG</span>
                </div>
            </a>

            <div class="hidden md:flex items-center gap-10 font-semibold tracking-wide">
                <a href="/" class="nav-link">Home</a>
                <a href="/about" class="nav-link">Über uns</a>
                <a href="#" class="nav-link">Fuhrpark</a>
                <a href="#" class="nav-link">Statistiken</a>
            </div>

            <div class="flex items-center gap-4">
                <a href="/hub" class="glass-button px-6 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 text-white">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-white"></span>
                    </span>
                    DRIVER HUB
                </a>
            </div>
        </nav>
    </header>

    <main id="page-wrapper" class="fade-wrapper flex-grow pt-32 pb-20 px-4">
        <div class="max-w-7xl mx-auto">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="mt-auto border-t border-white/5 bg-black/20 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 py-10">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-3 opacity-60">
                    <img src="{{ url_for('static', filename='eifellog.jpg') }}" alt="Logo" class="h-8 w-8 rounded-full grayscale">
                    <span class="font-bold tracking-widest text-sm">EIFELLOG VTC</span>
                </div>
                <div class="flex gap-8 text-sm text-gray-500 font-medium">
                    <a href="#" class="hover:text-white transition">Impressum</a>
                    <a href="#" class="hover:text-white transition">Datenschutz</a>
                    <a href="#" class="hover:text-white transition">Discord</a>
                </div>
                <p class="text-xs text-gray-600 font-mono">
                    &copy; 2026 EifelLog. Built for the Road.
                </p>
            </div>
        </div>
    </footer>

</body>
</html>
